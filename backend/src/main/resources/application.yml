server:
  port: 8080

spring:
  application:
    name: projectflow-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:projectflow;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
  cache:
    type: ${SPRING_CACHE_TYPE:simple}

projectflow:
  jwt:
    secret: ${JWT_SECRET:407780T00Y587123984712034981723491823491823498172349817239487123}
    expiration-ms: 86400000 # 24 hours

